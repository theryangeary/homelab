--- 
- name: Create service config directory
  file:
    path: "/opt/stacks/{{ stack_prefix }}cloudflared"
    state: directory
  become: true

- name: Get git repository root directory path
  ansible.builtin.shell: git rev-parse --show-toplevel
  register: git_root
  delegate_to: localhost
  become: false

- name: Template stack file
  template:
    src: stack.yml.j2
    dest: "/opt/stacks/{{ stack_prefix }}cloudflared/stack.yml"
  register: stack_changed
  become: true

- name: Deploy stack
  docker_stack:
    name: "{{ stack_prefix }}cloudflared"
    compose:
      - "/opt/stacks/{{ stack_prefix }}cloudflared/stack.yml"
    state: present
