--- 
- name: Create service config directory
  file:
    path: "/opt/stacks/{{ stack_prefix }}caddy"
    state: directory
  become: true

- name: Template caddy config file
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /opt/stacks/{{ stack_prefix }}caddy/Caddyfile
  register: caddy_config_result
  become: true

- name: Template stack file
  template:
    src: stack.yml.j2
    dest: "/opt/stacks/{{ stack_prefix }}caddy/stack.yml"
  register: stack_changed
  become: true

- name: Deploy stack
  docker_stack:
    name: "{{ stack_prefix }}caddy"
    compose:
      - "/opt/stacks/{{ stack_prefix }}caddy/stack.yml"
    state: present

- name: Get caddy container ID
  ansible.builtin.shell: "docker ps --filter 'name={{ stack_prefix }}caddy_caddy' --format '{{ '{{' }}.ID{{ '}}' }}'"
  register: caddy_container_id
  changed_when: false

- name: Ensure caddy config gets reloaded with SIGUSR1
  ansible.builtin.shell: "docker kill -s USR1 {{ caddy_container_id.stdout }}"
  when: stack_changed.changed or caddy_config_result.changed
