--- 
- name: Create service config directory
  file:
    path: "/opt/stacks/{{ stack_prefix }}caddy"
    state: directory
  become: true

- name: Get git repository root directory path
  ansible.builtin.shell: git rev-parse --show-toplevel
  register: git_root
  delegate_to: localhost
  become: false

- name: Template caddy config file
  ansible.builtin.template:
    src: "{{ git_root.stdout }}/caddy/conf/Caddyfile.j2"
    dest: /opt/stacks/{{ stack_prefix }}caddy/Caddyfile
  become: true

- name: Template stack file
  template:
    src: stack.yml.j2
    dest: "/opt/stacks/{{ stack_prefix }}caddy/stack.yml"
  register: stack_changed
  become: true

- name: Deploy stack
  docker_stack:
    name: "{{ stack_prefix }}caddy"
    compose:
      - "/opt/stacks/{{ stack_prefix }}caddy/stack.yml"
    state: present
