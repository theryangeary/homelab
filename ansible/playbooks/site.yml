- hosts: all
  vars_files:
    - vars/main.yml
  roles:
    - geerlingguy.security
  become: true

- hosts: swarm_managers
  roles:
    - role: host-setup
      tags: [host-setup, infrastructure]

    - role: install-docker
      tags: [docker, infrastructure]

    - role: init-swarm
      tags: [swarm, infrastructure]

    - role: swarm-networks
      tags: [swarm, infrastructure]

    - role: service-cloudflared
      tags: [cloudflared, services]

    - role: service-caddy
      tags: [caddy, services]

    - role: service-caddy_internal
      tags: [caddy, services]

    - role: service-www
      tags: [www, services]

    - role: service-authelia
      tags: [authelia, services]

    - role: service-gl
      tags: [gl, services]

    - role: service-pathfinder
      tags: [pathfinder, services]

    - role: service-mta-display
      tags: [mtadisplay, services]

    - role: service-ntfy
      tags: [ntfy, services]

- hosts: swarm_workers
  roles:
    - role: host-setup
    - role: install-docker
      tags: [docker]
