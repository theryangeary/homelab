---
- name: Install Docker on Ubuntu using official Docker repo
  hosts: all
  become: true
  vars:
    # Docker uses different architecture names than system reports
    docker_arch_map:
      x86_64: amd64
      aarch64: arm64      # This is the key mapping!
      armv7l: armhf
      armv6l: armhf

  tasks:

    - name: Set Docker architecture
      set_fact:
        docker_arch: "{{ docker_arch_map[ansible_facts['architecture']] | default('amd64') }}"

    - name: Debug architecture
      debug:
        msg: "System arch: {{ ansible_facts['architecture'] }}, Docker arch: {{ docker_arch }}"
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes

    - name: Ensure dependencies are installed
      ansible.builtin.package:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Add Docker's official GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/debian/gpg
        state: present

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: 'deb [arch={{ docker_arch }}] https://download.docker.com/linux/{{ ansible_facts["distribution"] | lower }} {{ ansible_facts["distribution_release"] }} stable'
        state: present

    - name: Update apt cache after adding docker repo
      ansible.builtin.apt:
        update_cache: yes
        force_apt_get: yes

    - name: Install Docker
      ansible.builtin.apt:
        name: docker-ce
        state: latest

    - name: Install Docker Compose
      ansible.builtin.apt:
        name: docker-compose
        state: latest

    - name: Start Docker service
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
